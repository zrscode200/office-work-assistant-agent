<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Assistant Dashboard</title>
  <style>
    :root {
      --bg: #edeee8;
      --bg-card: #f6f5f2;
      --bg-hover: #e8e7e2;
      --text: #1a1c2b;
      --text-sec: #3d3f4e;
      --text-muted: #7c7e8a;
      --border: #d6d5ce;
      --border-light: #eceae5;
      --accent: #4f46e5;
      --accent-light: #eef2ff;
      --green: #059669;
      --green-bg: #ecfdf5;
      --green-text: #065f46;
      --amber: #d97706;
      --amber-bg: #fffbeb;
      --amber-text: #92400e;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --red-text: #991b1b;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      padding: 0 28px; display: flex; justify-content: space-between; align-items: center;
      height: 52px;
    }
    .header h1 { font-size: 19px; font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--text-muted); }
    .btn-sm {
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-sec); font-size: 13px;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 4px;
    }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm.loading { opacity: 0.5; pointer-events: none; }
    .btn-sm.loading .spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; }

    .container { max-width: 1160px; margin: 0 auto; padding: 20px 24px; }

    /* Summary pills */
    .summary-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .summary-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 8px; font-size: 16px; font-weight: 500;
      background: var(--bg-card); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.15s;
    }
    .summary-pill:hover { border-color: #c0c4cc; }
    .summary-pill.active { border-color: var(--accent); background: var(--accent-light); }
    .summary-pill .n { font-weight: 700; font-size: 20px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-all { background: var(--accent); }
    .dot-green { background: var(--green); }
    .dot-amber { background: var(--amber); }
    .dot-red { background: var(--red); }

    /* Alerts */
    .alerts { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .alert-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 8px; font-size: 14px; font-weight: 500;
    }
    .alert-chip.red { background: var(--red-bg); color: var(--red-text); }
    .alert-chip.amber { background: var(--amber-bg); color: var(--amber-text); }
    .alert-chip.muted { background: var(--border-light); color: var(--text-muted); }

    /* Workspace tabs */
    .workspace-tabs {
      display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px;
    }
    .ws-tab {
      padding: 10px 20px; font-size: 16px; font-weight: 500;
      color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all 0.15s;
      display: flex; align-items: center; gap: 8px;
    }
    .ws-tab:hover { color: var(--text-sec); }
    .ws-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .ws-tab .count {
      background: var(--border-light); color: var(--text-muted);
      padding: 1px 7px; border-radius: 10px; font-size: 12px; font-weight: 600;
    }
    .ws-tab.active .count { background: var(--accent-light); color: var(--accent); }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Project table */
    .project-table {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
    }
    .table-head {
      display: grid;
      grid-template-columns: 10px 2fr 100px 2.5fr 1.5fr 100px 28px;
      padding: 8px 16px; gap: 12px;
      background: var(--bg); font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted);
      border-bottom: 1px solid var(--border); align-items: center;
    }
    .project-row { border-bottom: 1px solid var(--border); }
    .project-row:last-child { border-bottom: none; }
    .row-summary {
      display: grid;
      grid-template-columns: 10px 2fr 100px 2.5fr 1.5fr 100px 28px;
      padding: 14px 16px; gap: 12px;
      cursor: pointer; transition: background 0.1s; align-items: center; font-size: 16px;
    }
    .row-summary:hover { background: var(--border-light); }
    .project-row.expanded .row-summary { background: var(--accent-light); }

    .health-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .hd-on-track, .hd-in-progress { background: var(--green); }
    .hd-at-risk { background: var(--amber); }
    .hd-blocked { background: var(--red); animation: pulse 2s infinite; }
    .hd-not-started { background: var(--text-muted); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .proj-name { font-weight: 600; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .health-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 12px; font-size: 13px; font-weight: 600;
    }
    .hb-on-track, .hb-in-progress { background: var(--green-bg); color: var(--green-text); }
    .hb-at-risk { background: var(--amber-bg); color: var(--amber-text); }
    .hb-blocked { background: var(--red-bg); color: var(--red-text); }
    .hb-not-started { background: var(--border-light); color: var(--text-muted); }

    .cell-text { color: var(--text-sec); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cell-time { font-size: 14px; font-weight: 500; }
    .ct-green { color: var(--green); }
    .ct-amber { color: var(--amber); }
    .ct-red { color: var(--red); }

    .expand-icon { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; text-align: center; }
    .project-row.expanded .expand-icon { transform: rotate(180deg); }

    /* Expanded detail */
    .row-detail { max-height: 0; overflow: hidden; transition: max-height 0.35s ease-out; }
    .project-row.expanded .row-detail { max-height: 2000px; }
    .detail-inner { padding: 0 16px 20px 38px; border-top: 1px solid var(--border); }

    .detail-tabs {
      display: flex; gap: 0; border-bottom: 1px solid var(--border); padding-top: 8px;
    }
    .dtab {
      padding: 8px 16px; font-size: 15px; font-weight: 500;
      color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all 0.15s;
    }
    .dtab:hover { color: var(--text-sec); }
    .dtab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .dtab .bcnt { font-size: 10px; background: var(--border-light); color: var(--text-muted); padding: 0 5px; border-radius: 8px; margin-left: 4px; }

    .detail-panel { display: none; padding: 16px 0; }
    .detail-panel.active { display: block; }

    /* Rendered markdown */
    .md h1 { font-size: 20px; font-weight: 600; margin: 16px 0 8px; }
    .md h2 { font-size: 17px; font-weight: 600; margin: 14px 0 6px; color: var(--text); }
    .md h3 { font-size: 16px; font-weight: 600; margin: 12px 0 4px; color: var(--text); }
    .md h1:first-child, .md h2:first-child, .md h3:first-child { margin-top: 0; }
    .md p { font-size: 16px; color: var(--text-sec); margin-bottom: 8px; line-height: 1.6; }
    .md ul { padding-left: 18px; margin-bottom: 8px; }
    .md li { font-size: 16px; color: var(--text-sec); margin-bottom: 3px; line-height: 1.5; }
    .md strong { color: var(--text); font-weight: 600; }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

    /* Status timeline */
    .status-entry { padding: 12px 0; border-bottom: 1px solid var(--border-light); }
    .status-entry:last-child { border-bottom: none; }
    .se-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .se-date { font-size: 13px; font-weight: 600; color: var(--text-muted); }
    .se-badge { font-size: 11px; font-weight: 600; padding: 1px 8px; border-radius: 10px; }
    .seb-on-track, .seb-in-progress { background: var(--green-bg); color: var(--green); }
    .seb-at-risk { background: var(--amber-bg); color: var(--amber); }
    .seb-blocked { background: var(--red-bg); color: var(--red); }
    .seb-not-started { background: var(--border-light); color: var(--text-muted); }
    .se-label { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-top: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
    .se-items { padding-left: 16px; }
    .se-items li { font-size: 15px; color: var(--text-sec); margin-bottom: 2px; }

    /* Artifact rows */
    .artifact-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.1s; margin-bottom: 2px;
    }
    .artifact-row:hover { background: var(--border-light); }
    .artifact-icon {
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0;
    }
    .ai-meeting { background: #dbeafe; color: #1d4ed8; }
    .ai-decision { background: #ede9fe; color: #6d28d9; }
    .ai-plan { background: #d1fae5; color: #059669; }
    .ai-todo { background: #fef3c7; color: #92400e; }
    .artifact-info { flex: 1; min-width: 0; }
    .artifact-title { font-size: 16px; font-weight: 500; }
    .artifact-sub { font-size: 12px; color: var(--text-muted); }
    .artifact-date { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }

    /* Expandable artifact content */
    .artifact-expand { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
    .artifact-expand.open { max-height: 2000px; }
    .artifact-expand-inner { padding: 8px 12px 12px 52px; }

    /* Activity */
    .activity-section {
      margin-top: 28px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
    }
    .activity-header {
      padding: 14px 20px; font-size: 16px; font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .act-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; border-bottom: 1px solid var(--border-light); font-size: 15px;
    }
    .act-item:last-child { border-bottom: none; }
    .act-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .act-dot.status { background: #818cf8; }
    .act-dot.meeting { background: #3b82f6; }
    .act-dot.decision { background: #8b5cf6; }
    .act-dot.created { background: var(--green); }
    .act-text { flex: 1; color: var(--text-sec); }
    .act-text .proj { font-weight: 600; color: var(--text); }
    .act-time { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }

    /* Completed */
    .completed-section { margin-top: 24px; }
    .completed-label {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px;
    }
    .completed-list {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .comp-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 20px; border-bottom: 1px solid var(--border-light); font-size: 15px;
    }
    .comp-item:last-child { border-bottom: none; }
    .comp-check { color: var(--green); margin-right: 8px; }
    .comp-date { font-size: 13px; color: var(--text-muted); }

    /* Empty / loading */
    .empty-state {
      text-align: center; padding: 40px 24px; color: var(--text-muted); font-size: 14px;
    }
    .loading-state { text-align: center; padding: 56px 24px; color: var(--text-muted); font-size: 15px; }

    .footer { text-align: center; padding: 20px; font-size: 12px; color: var(--text-muted); }

    /* View switcher */
    .view-switcher {
      display: flex; background: var(--bg); border-radius: 8px; padding: 2px;
      border: 1px solid var(--border);
    }
    .vs-btn {
      padding: 5px 16px; border-radius: 6px; border: none; background: transparent;
      font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer;
      transition: all 0.15s;
    }
    .vs-btn:hover { color: var(--text-sec); }
    .vs-btn.active { background: var(--accent); color: #fff; }
    .view { display: none; }
    .view.active { display: block; }

    /* Desk layout */
    .desk-container {
      display: flex; gap: 20px; min-height: calc(100vh - 120px);
    }
    .desk-todos {
      flex: 1 1 50%; min-width: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
      display: flex; flex-direction: column;
    }
    .desk-right {
      flex: 1 1 50%; min-width: 0;
      display: flex; flex-direction: column; gap: 16px;
    }
    .desk-scratch {
      flex: 3 1 0; min-height: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
      display: flex; flex-direction: column;
    }
    .desk-notebook {
      flex: 2 1 0; min-height: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
      display: flex; flex-direction: column;
    }
    .desk-section-header {
      padding: 12px 16px; font-size: 14px; font-weight: 600;
      border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
      color: var(--text); flex-shrink: 0;
    }
    .desk-section-header .count {
      background: var(--border-light); color: var(--text-muted);
      padding: 1px 7px; border-radius: 10px; font-size: 12px; font-weight: 600;
    }
    .desk-section-body { flex: 1; overflow-y: auto; }

    /* Todo stats */
    .todo-stats {
      display: flex; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .todo-stat {
      display: flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 600; color: var(--text-muted);
    }
    .todo-stat .n { font-size: 18px; font-weight: 700; }
    .todo-stat.overdue .n { color: var(--red); }
    .todo-stat.today .n { color: var(--amber); }
    .todo-stat.high .n { color: var(--accent); }

    /* Todo filters */
    .todo-filters {
      display: flex; gap: 6px; padding: 10px 16px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; flex-shrink: 0;
    }
    .todo-filter {
      padding: 4px 12px; border-radius: 14px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .todo-filter:hover { border-color: var(--accent); color: var(--accent); }
    .todo-filter.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* Todo list */
    .todo-list { flex: 1; overflow-y: auto; }
    .todo-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border-light);
      transition: all 0.3s;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item.completing {
      opacity: 0; transform: translateX(-20px); max-height: 0;
      padding-top: 0; padding-bottom: 0; overflow: hidden;
    }
    .todo-checkbox {
      width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border);
      cursor: pointer; flex-shrink: 0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; background: transparent;
    }
    .todo-checkbox:hover { border-color: var(--accent); background: var(--accent-light); }
    .todo-info { flex: 1; min-width: 0; }
    .todo-what { font-size: 14px; color: var(--text); line-height: 1.4; }
    .todo-meta {
      display: flex; gap: 8px; align-items: center; margin-top: 3px; flex-wrap: wrap;
    }
    .todo-due {
      font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 4px;
    }
    .todo-due.overdue { background: var(--red-bg); color: var(--red-text); }
    .todo-due.today { background: var(--amber-bg); color: var(--amber-text); }
    .todo-due.upcoming { background: var(--green-bg); color: var(--green-text); }
    .todo-due.future { background: var(--border-light); color: var(--text-muted); }
    .todo-pri {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .todo-pri.high { color: var(--red); }
    .todo-pri.low { color: var(--text-muted); }
    .todo-project {
      font-size: 11px; color: var(--accent); background: var(--accent-light);
      padding: 1px 6px; border-radius: 4px;
    }
    .todo-group {
      font-size: 11px; color: var(--text-muted); background: var(--border-light);
      padding: 1px 6px; border-radius: 4px;
    }
    .todo-recur {
      font-size: 10px; color: var(--green); font-weight: 600;
    }

    /* Sub-items */
    .todo-subs { padding-left: 28px; }
    .todo-sub {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 16px 4px 0; font-size: 13px; color: var(--text-sec);
    }
    .todo-sub-check {
      width: 14px; height: 14px; border-radius: 3px; border: 2px solid var(--border);
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; font-size: 9px; background: transparent;
    }
    .todo-sub-check:hover { border-color: var(--accent); }
    .todo-sub-check.done { border-color: var(--green); background: var(--green); color: #fff; }
    .todo-sub-what { flex: 1; }
    .todo-sub.done .todo-sub-what { text-decoration: line-through; color: var(--text-muted); }

    /* Scratch / notebook entries */
    .desk-entry {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border-light);
      cursor: pointer; transition: background 0.1s;
    }
    .desk-entry:hover { background: var(--border-light); }
    .desk-entry-icon {
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .dei-scratch { background: #fef3c7; color: #92400e; }
    .dei-notebook { background: #dbeafe; color: #1d4ed8; }
    .dei-promoted { background: #d1fae5; color: #059669; }
    .dei-graduated { background: #ede9fe; color: #6d28d9; }
    .desk-entry-info { flex: 1; min-width: 0; }
    .desk-entry-title {
      font-size: 14px; font-weight: 500; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .desk-entry-sub {
      font-size: 12px; color: var(--text-muted); margin-top: 1px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .desk-entry-date { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
    .desk-entry-badge {
      font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 8px;
      flex-shrink: 0;
    }
    .deb-active { background: var(--amber-bg); color: var(--amber-text); }
    .deb-promoted { background: var(--green-bg); color: var(--green-text); }
    .deb-developing { background: #dbeafe; color: #1d4ed8; }
    .deb-graduated { background: #ede9fe; color: #6d28d9; }

    .desk-entry-expand {
      max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out;
    }
    .desk-entry-expand.open { max-height: 3000px; }
    .desk-entry-expand-inner { padding: 8px 16px 16px 54px; }

    .desk-empty {
      padding: 24px 16px; text-align: center; color: var(--text-muted); font-size: 13px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .desk-container { flex-direction: column; }
      .desk-todos, .desk-right { flex: none; }
      .desk-right { flex-direction: column; }
      .desk-scratch, .desk-notebook { flex: none; min-height: 300px; }
      .table-head { grid-template-columns: 10px 1fr 80px 28px; }
      .row-summary { grid-template-columns: 10px 1fr 80px 28px; }
      .table-head > :nth-child(4), .table-head > :nth-child(5), .table-head > :nth-child(6),
      .row-summary > :nth-child(4), .row-summary > :nth-child(5), .row-summary > :nth-child(6) { display: none; }
    }
    @media (max-width: 640px) {
      .container { padding: 12px; }
      .header { padding: 0 16px; }
      .detail-inner { padding: 0 12px 16px 12px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Work Assistant</h1>
  <div class="view-switcher">
    <button class="vs-btn active" data-view="projects" onclick="switchView('projects')">Projects</button>
    <button class="vs-btn" data-view="desk" onclick="switchView('desk')">Drafting Table</button>
  </div>
  <div class="header-right">
    <span id="header-owner"></span>
    <span id="header-date"></span>
    <button class="btn-sm" id="btn-refresh" onclick="refresh()">
      <span class="spin">&#x21bb;</span> Refresh
    </button>
  </div>
</div>

<div id="view-projects" class="view active">
  <div class="container">
    <div class="summary-bar" id="summary-bar"></div>
    <div class="alerts" id="alerts"></div>
    <div class="workspace-tabs" id="workspace-tabs"></div>
    <div id="tab-panels"><div class="loading-state">Loading dashboard data...</div></div>
    <div class="activity-section" id="activity-section" style="display:none">
      <div class="activity-header">Recent Activity</div>
      <div id="activity-list"></div>
    </div>
    <div class="completed-section" id="completed-section" style="display:none">
      <div class="completed-label">Completed</div>
      <div class="completed-list" id="completed-list"></div>
    </div>
  </div>
</div>

<div id="view-desk" class="view">
  <div class="container">
    <div class="desk-container">
      <div class="desk-todos">
        <div class="desk-section-header">Todos <span class="count" id="todo-count"></span></div>
        <div class="todo-stats" id="todo-stats"></div>
        <div class="todo-filters" id="todo-filters"></div>
        <div class="todo-list desk-section-body" id="todo-list"></div>
      </div>
      <div class="desk-right">
        <div class="desk-scratch">
          <div class="desk-section-header">Scratch Pad <span class="count" id="scratch-count"></span></div>
          <div class="desk-section-body" id="scratch-list"></div>
        </div>
        <div class="desk-notebook">
          <div class="desk-section-header">Notebook <span class="count" id="notebook-count"></span></div>
          <div class="desk-section-body" id="notebook-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="footer">Work Assistant Dashboard &middot; <span id="footer-time"></span></div>

<script>
(function () {
  var currentData = null;
  var currentFilter = 'all';
  var activeWsTab = null;
  var detailCache = {};

  // ── Helpers ──────────────────────────────────────────────

  function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
  }

  function inlineMd(s) {
    return s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  }

  function renderMd(text) {
    if (!text) return '';
    var lines = text.split('\n');
    var html = '';
    var inList = false;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (!line.trim()) {
        if (inList) { html += '</ul>'; inList = false; }
        continue;
      }
      if (/^[-*_]{3,}\s*$/.test(line.trim())) {
        if (inList) { html += '</ul>'; inList = false; }
        html += '<hr>';
        continue;
      }
      var hMatch = line.match(/^(#{1,4})\s+(.+)$/);
      if (hMatch) {
        if (inList) { html += '</ul>'; inList = false; }
        var lvl = hMatch[1].length;
        html += '<h' + lvl + '>' + inlineMd(esc(hMatch[2])) + '</h' + lvl + '>';
        continue;
      }
      var liMatch = line.match(/^[-*]\s+(?:\[[ x]]\s+)?(.+)$/);
      if (liMatch) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += '<li>' + inlineMd(esc(liMatch[1])) + '</li>';
        continue;
      }
      if (inList) { html += '</ul>'; inList = false; }
      html += '<p>' + inlineMd(esc(line)) + '</p>';
    }
    if (inList) html += '</ul>';
    return '<div class="md">' + html + '</div>';
  }

  function relativeTime(dateStr) {
    if (!dateStr) return '';
    var now = new Date();
    var then = new Date(dateStr + 'T00:00:00');
    var days = Math.floor((now - then) / 86400000);
    if (days < 0) return 'future';
    if (days === 0) return 'today';
    if (days === 1) return '1d ago';
    if (days < 7) return days + 'd ago';
    if (days < 30) return Math.floor(days / 7) + 'w ago';
    if (days < 365) return Math.floor(days / 30) + 'mo ago';
    return Math.floor(days / 365) + 'y ago';
  }

  function timeClass(dateStr) {
    if (!dateStr) return 'ct-red';
    var days = Math.floor((new Date() - new Date(dateStr + 'T00:00:00')) / 86400000);
    if (days <= 7) return 'ct-green';
    if (days <= 14) return 'ct-amber';
    return 'ct-red';
  }

  function healthDot(h) {
    return '<div class="health-dot hd-' + esc(h || 'on-track') + '"></div>';
  }

  function healthBadge(h) {
    if (!h) return '';
    var label = h.replace(/-/g, ' ');
    label = label.charAt(0).toUpperCase() + label.slice(1);
    return '<span class="health-badge hb-' + esc(h) + '">' + esc(label) + '</span>';
  }

  function statusBadge(h) {
    if (!h) return '';
    var label = h.replace(/-/g, ' ');
    label = label.charAt(0).toUpperCase() + label.slice(1);
    return '<span class="se-badge seb-' + esc(h) + '">' + esc(label) + '</span>';
  }

  function filterProjects(list) {
    if (currentFilter === 'all') return list;
    if (currentFilter === 'on-track') {
      return list.filter(function (p) {
        return p.health === 'on-track' || p.health === 'in-progress' || p.health === 'not-started';
      });
    }
    return list.filter(function (p) { return p.health === currentFilter; });
  }

  // ── Fetch & render ──────────────────────────────────────

  function render(data) {
    var ts = new Date(data.generated).toLocaleString();
    document.getElementById('header-owner').textContent = data.owner || '';
    document.getElementById('header-date').textContent = ts;
    document.getElementById('footer-time').textContent = ts;

    var active = (data.projects && data.projects.active) || [];
    var completed = (data.projects && data.projects.completed) || [];
    var grouped = (data.projects && data.projects.grouped) || { personal: { projects: [] }, teams: [] };
    var alerts = data.alerts || {};
    var activities = data.activities || [];

    renderSummaryPills(active);
    renderAlerts(alerts);
    renderWorkspaceTabs(grouped);
    renderActivityFeed(activities);
    renderCompleted(completed);
  }

  // ── Summary pills ─────────────────────────────────────

  function renderSummaryPills(active) {
    var onTrack = active.filter(function (p) { return p.health === 'on-track' || p.health === 'in-progress' || p.health === 'not-started'; }).length;
    var atRisk = active.filter(function (p) { return p.health === 'at-risk'; }).length;
    var blocked = active.filter(function (p) { return p.health === 'blocked'; }).length;

    document.getElementById('summary-bar').innerHTML =
      pill('all', 'dot-all', active.length, 'Active') +
      pill('on-track', 'dot-green', onTrack, 'On Track') +
      pill('at-risk', 'dot-amber', atRisk, 'At Risk') +
      pill('blocked', 'dot-red', blocked, 'Blocked');
  }

  function pill(filter, dotClass, num, label) {
    var cls = 'summary-pill' + (currentFilter === filter ? ' active' : '');
    return '<div class="' + cls + '" data-filter="' + filter + '">' +
      '<span class="dot ' + dotClass + '"></span>' +
      '<span class="n">' + num + '</span> ' + esc(label) + '</div>';
  }

  // ── Alerts ──────────────────────────────────────────────

  function renderAlerts(alerts) {
    var h = '';
    if (alerts.blocked && alerts.blocked.length)
      h += alerts.blocked.map(function (n) { return '<span class="alert-chip red">&#x26A0; ' + esc(n) + ' blocked</span>'; }).join('');
    if (alerts.stale && alerts.stale.length)
      h += alerts.stale.map(function (n) { return '<span class="alert-chip amber">&#x23F0; ' + esc(n) + ' stale</span>'; }).join('');
    if (alerts.unregistered && alerts.unregistered.length)
      h += alerts.unregistered.map(function (u) { return '<span class="alert-chip muted">' + esc(u.name) + ' unregistered (' + esc(u.repo) + ')</span>'; }).join('');
    document.getElementById('alerts').innerHTML = h;
  }

  // ── Workspace tabs ────────────────────────────────────

  function renderWorkspaceTabs(grouped) {
    var tabsHtml = '';
    var panelsHtml = '';

    // Determine default tab
    if (!activeWsTab) activeWsTab = 'personal';

    var personalFiltered = filterProjects(grouped.personal.projects || []);
    tabsHtml += wsTab('personal', 'My Projects', personalFiltered.length);
    panelsHtml += tabPanel('personal', personalFiltered);

    (grouped.teams || []).forEach(function (team) {
      var tabId = 'team-' + team.repo;
      var teamFiltered = filterProjects(team.projects || []);
      tabsHtml += wsTab(tabId, team.repo, teamFiltered.length);
      panelsHtml += tabPanel(tabId, teamFiltered);
    });

    document.getElementById('workspace-tabs').innerHTML = tabsHtml;
    document.getElementById('tab-panels').innerHTML = panelsHtml;
  }

  function wsTab(tabId, label, count) {
    var cls = 'ws-tab' + (activeWsTab === tabId ? ' active' : '');
    return '<div class="' + cls + '" data-tab="' + esc(tabId) + '">' +
      esc(label) + ' <span class="count">' + count + '</span></div>';
  }

  function tabPanel(tabId, projects) {
    var cls = 'tab-panel' + (activeWsTab === tabId ? ' active' : '');
    var h = '<div class="' + cls + '" id="panel-' + esc(tabId) + '">';

    if (!projects.length) {
      var msg = currentFilter === 'all'
        ? 'No active projects in this workspace.'
        : 'No <strong>' + esc(currentFilter.replace(/-/g, ' ')) + '</strong> projects.';
      h += '<div class="empty-state">' + msg + '</div>';
    } else {
      h += '<div class="project-table">';
      h += '<div class="table-head"><div></div><div>Project</div><div>Health</div><div>Progress</div><div>Next</div><div>Updated</div><div></div></div>';
      projects.forEach(function (p) { h += projectRow(p); });
      h += '</div>';
    }
    h += '</div>';
    return h;
  }

  function projectRow(p) {
    var h = '<div class="project-row" data-project="' + esc(p.name) + '">';
    h += '<div class="row-summary">';
    h += healthDot(p.health);
    h += '<div class="proj-name">' + esc(p.name) + (p.todos && p.todos.length ? ' <span class="bcnt" style="font-size:10px;font-weight:600;background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:8px;margin-left:6px;">' + p.todos.length + ' todo' + (p.todos.length > 1 ? 's' : '') + '</span>' : '') + '</div>';
    h += '<div>' + healthBadge(p.health) + '</div>';
    h += '<div class="cell-text">' + esc(p.summary || '') + '</div>';
    h += '<div class="cell-text">' + esc(p.nextMilestone || '') + '</div>';
    h += '<div class="cell-time ' + timeClass(p.lastUpdated) + '">' + relativeTime(p.lastUpdated) + '</div>';
    h += '<div class="expand-icon">&#x25BC;</div>';
    h += '</div>';
    h += '<div class="row-detail"><div class="detail-loading" style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px;">Loading...</div></div>';
    h += '</div>';
    return h;
  }

  // ── Row expand / detail ──────────────────────────────

  function toggleRow(rowEl) {
    var name = rowEl.dataset.project;
    var wasExpanded = rowEl.classList.contains('expanded');

    if (wasExpanded) {
      rowEl.classList.remove('expanded');
      return;
    }

    rowEl.classList.add('expanded');

    if (detailCache[name]) {
      renderRowDetail(rowEl, detailCache[name]);
      return;
    }

    fetch('/api/project/' + encodeURIComponent(name))
      .then(function (r) { return r.json(); })
      .then(function (d) {
        detailCache[name] = d;
        renderRowDetail(rowEl, d);
      })
      .catch(function (err) {
        rowEl.querySelector('.row-detail').innerHTML =
          '<div style="padding:16px;color:var(--red);">Failed to load: ' + esc(err.message) + '</div>';
      });
  }

  function renderRowDetail(rowEl, d) {
    var name = d.name;
    var prefix = name.replace(/[^a-z0-9]/g, '-');
    var meetings = d.meetings || [];
    var decisions = d.decisions || [];
    var statusHistory = d.statusHistory || [];

    var todos = d.todos || [];

    var tabs = [];
    tabs.push({ id: prefix + '-overview', label: 'Overview', active: true });
    tabs.push({ id: prefix + '-status', label: 'Status', count: statusHistory.length });
    if (d.plan) tabs.push({ id: prefix + '-plan', label: 'Plan' });
    tabs.push({ id: prefix + '-meetings', label: 'Meetings', count: meetings.length });
    tabs.push({ id: prefix + '-decisions', label: 'Decisions', count: decisions.length });
    if (todos.length) tabs.push({ id: prefix + '-todos', label: 'Todos', count: todos.length });

    var h = '<div class="detail-inner">';

    // Tabs
    h += '<div class="detail-tabs">';
    tabs.forEach(function (t) {
      var cls = 'dtab' + (t.active ? ' active' : '');
      h += '<div class="' + cls + '" data-panel="' + t.id + '">' + esc(t.label);
      if (t.count !== undefined) h += '<span class="bcnt">' + t.count + '</span>';
      h += '</div>';
    });
    h += '</div>';

    // Overview panel
    h += '<div class="detail-panel active" id="' + prefix + '-overview">';
    if (d.overview && d.overview.fullContent) {
      h += renderMd(d.overview.fullContent);
    } else {
      h += '<div style="color:var(--text-muted);font-size:13px;">No overview available.</div>';
    }
    h += '</div>';

    // Status panel
    h += '<div class="detail-panel" id="' + prefix + '-status">';
    if (statusHistory.length) {
      statusHistory.forEach(function (entry) {
        h += '<div class="status-entry">';
        h += '<div class="se-head"><span class="se-date">' + esc(entry.date || 'Unknown') + '</span>' + statusBadge(entry.health) + '</div>';
        if (entry.title) h += '<div style="font-size:13px;font-weight:600;margin-bottom:4px;">' + esc(entry.title) + '</div>';
        if (entry.progress.length) {
          h += '<ul class="se-items">' + entry.progress.map(function (p) { return '<li>' + esc(p) + '</li>'; }).join('') + '</ul>';
        }
        if (entry.blockers && entry.blockers.length) {
          h += '<div class="se-label">Blockers</div>';
          h += '<ul class="se-items">' + entry.blockers.map(function (b) { return '<li>' + esc(b) + '</li>'; }).join('') + '</ul>';
        }
        if (entry.risks && entry.risks.length) {
          h += '<div class="se-label">Risks</div>';
          h += '<ul class="se-items">' + entry.risks.map(function (r) { return '<li>' + esc(r) + '</li>'; }).join('') + '</ul>';
        }
        if (entry.next && entry.next.length) {
          h += '<div class="se-label">Next</div>';
          h += '<ul class="se-items">' + entry.next.map(function (n) { return '<li>' + esc(n) + '</li>'; }).join('') + '</ul>';
        }
        h += '</div>';
      });
    } else {
      h += '<div style="color:var(--text-muted);font-size:13px;">No status history.</div>';
    }
    h += '</div>';

    // Plan panel
    if (d.plan) {
      h += '<div class="detail-panel" id="' + prefix + '-plan">';
      h += renderMd(d.plan);
      h += '</div>';
    }

    // Meetings panel
    h += '<div class="detail-panel" id="' + prefix + '-meetings">';
    if (meetings.length) {
      meetings.forEach(function (m, idx) {
        var mid = prefix + '-mtg-' + idx;
        h += '<div class="artifact-row" data-expand="' + mid + '">';
        h += '<div class="artifact-icon ai-meeting">&#x1F4C5;</div>';
        h += '<div class="artifact-info"><div class="artifact-title">' + esc(m.topic) + '</div>';
        h += '<div class="artifact-sub">';
        if (m.attendees && m.attendees.length) h += m.attendees.length + ' attendees';
        if (m.purpose) h += (m.attendees && m.attendees.length ? ' &middot; ' : '') + esc(m.purpose);
        h += '</div></div>';
        h += '<div class="artifact-date">' + esc(m.date || '') + '</div>';
        h += '</div>';
        h += '<div class="artifact-expand" id="' + mid + '"><div class="artifact-expand-inner">' + renderMd(m.content) + '</div></div>';
      });
    } else {
      h += '<div style="color:var(--text-muted);font-size:13px;padding:8px 0;">No meetings recorded.</div>';
    }
    h += '</div>';

    // Decisions panel
    h += '<div class="detail-panel" id="' + prefix + '-decisions">';
    if (decisions.length) {
      decisions.forEach(function (dec, idx) {
        var did = prefix + '-dec-' + idx;
        h += '<div class="artifact-row" data-expand="' + did + '">';
        h += '<div class="artifact-icon ai-decision">&#x2696;</div>';
        h += '<div class="artifact-info"><div class="artifact-title">' + esc(dec.name) + '</div>';
        h += '<div class="artifact-sub">';
        if (dec.status) h += esc(dec.status);
        if (dec.participants && dec.participants.length) h += ' &middot; ' + dec.participants.length + ' participants';
        h += '</div></div>';
        h += '<div class="artifact-date">' + esc(dec.date || '') + '</div>';
        h += '</div>';
        h += '<div class="artifact-expand" id="' + did + '"><div class="artifact-expand-inner">' + renderMd(dec.content) + '</div></div>';
      });
    } else {
      h += '<div style="color:var(--text-muted);font-size:13px;padding:8px 0;">No decisions recorded.</div>';
    }
    h += '</div>';

    // Todos panel
    if (todos.length) {
      h += '<div class="detail-panel" id="' + prefix + '-todos">';
      todos.forEach(function (todo) {
        h += '<div class="artifact-row">';
        h += '<div class="artifact-icon ai-todo">&#x2610;</div>';
        h += '<div class="artifact-info"><div class="artifact-title">' + esc(todo.what) + '</div>';
        h += '<div class="artifact-sub">';
        if (todo.priority && todo.priority !== 'normal') h += '<span style="font-weight:600;">' + esc(todo.priority) + '</span>';
        if (todo.status && todo.status !== 'open') h += (todo.priority && todo.priority !== 'normal' ? ' &middot; ' : '') + esc(todo.status);
        h += '</div></div>';
        if (todo.due) {
          var tc = timeClass(todo.due);
          h += '<div class="artifact-date ' + tc + '">' + esc(todo.due) + '</div>';
        }
        h += '</div>';
      });
      h += '</div>';
    }

    h += '</div>';
    rowEl.querySelector('.row-detail').innerHTML = h;

    // Bind detail tabs
    rowEl.querySelectorAll('.dtab').forEach(function (tab) {
      tab.addEventListener('click', function (e) {
        e.stopPropagation();
        var inner = tab.closest('.detail-inner');
        inner.querySelectorAll('.dtab').forEach(function (t) { t.classList.remove('active'); });
        inner.querySelectorAll('.detail-panel').forEach(function (p) { p.classList.remove('active'); });
        tab.classList.add('active');
        var panel = document.getElementById(tab.dataset.panel);
        if (panel) panel.classList.add('active');
      });
    });

    // Bind artifact expand
    rowEl.querySelectorAll('.artifact-row[data-expand]').forEach(function (ar) {
      ar.addEventListener('click', function (e) {
        e.stopPropagation();
        var target = document.getElementById(ar.dataset.expand);
        if (target) target.classList.toggle('open');
      });
    });
  }

  // ── Activity feed ───────────────────────────────────────

  function renderActivityFeed(activities) {
    if (!activities || !activities.length) {
      document.getElementById('activity-section').style.display = 'none';
      return;
    }
    document.getElementById('activity-section').style.display = '';
    var verbs = { status: 'Status updated on', meeting: 'Meeting captured for', decision: 'Decision recorded for', created: 'Project created:' };
    var h = '';
    activities.forEach(function (a) {
      h += '<div class="act-item">';
      h += '<div class="act-dot ' + esc(a.type) + '"></div>';
      h += '<div class="act-text">' + esc(verbs[a.type] || '') + ' <span class="proj">' + esc(a.project) + '</span>';
      if (a.summary && a.type !== 'created') h += ' &mdash; ' + esc(a.summary);
      h += '</div>';
      h += '<div class="act-time">' + relativeTime(a.date) + '</div>';
      h += '</div>';
    });
    document.getElementById('activity-list').innerHTML = h;
  }

  // ── Completed ───────────────────────────────────────────

  function renderCompleted(completed) {
    if (!completed || !completed.length) {
      document.getElementById('completed-section').style.display = 'none';
      return;
    }
    document.getElementById('completed-section').style.display = '';
    var h = '';
    completed.forEach(function (p) {
      h += '<div class="comp-item">';
      h += '<div><span class="comp-check">&#10003;</span>' + esc(p.name) + '</div>';
      h += '<div class="comp-date">' + esc(p.completedDate || '') + '</div>';
      h += '</div>';
    });
    document.getElementById('completed-list').innerHTML = h;
  }

  // ── View switching ─────────────────────────────────────

  var currentView = 'projects';
  var deskData = null;
  var deskContentCache = {};
  var currentTodoFilter = 'all';

  window.switchView = function (view) {
    currentView = view;
    document.querySelectorAll('.vs-btn').forEach(function (b) {
      b.classList.toggle('active', b.dataset.view === view);
    });
    document.querySelectorAll('.view').forEach(function (v) {
      v.classList.toggle('active', v.id === 'view-' + view);
    });
    // Update URL
    var url = new URL(window.location);
    if (view === 'projects') url.searchParams.delete('view');
    else url.searchParams.set('view', view);
    history.replaceState(null, '', url);

    if (view === 'desk' && !deskData) fetchDesk();
  };

  // ── Desk data fetching ────────────────────────────────

  function fetchDesk() {
    fetch('/api/desk')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        deskData = data;
        renderDesk(data);
      })
      .catch(function (err) {
        document.getElementById('todo-list').innerHTML =
          '<div class="desk-empty">Failed to load: ' + esc(err.message) + '</div>';
      });
  }

  function renderDesk(data) {
    renderTodoStats(data.todos.stats);
    renderTodoFilters();
    renderTodoList(data.todos.items);
    renderScratchList(data.scratch);
    renderNotebookList(data.notebook);
  }

  // ── Todo rendering ────────────────────────────────────

  function renderTodoStats(stats) {
    var h = '';
    h += '<div class="todo-stat overdue"><span class="n">' + stats.overdue + '</span> overdue</div>';
    h += '<div class="todo-stat today"><span class="n">' + stats.today + '</span> due today</div>';
    h += '<div class="todo-stat high"><span class="n">' + stats.high + '</span> high pri</div>';
    h += '<div class="todo-stat"><span class="n">' + stats.total + '</span> open</div>';
    document.getElementById('todo-stats').innerHTML = h;
    document.getElementById('todo-count').textContent = stats.total;
  }

  function renderTodoFilters() {
    var filters = [
      { key: 'all', label: 'All' },
      { key: 'overdue', label: 'Overdue' },
      { key: 'today', label: 'Due Today' },
      { key: 'high', label: 'High Priority' },
      { key: 'has-project', label: 'By Project' }
    ];
    var h = '';
    filters.forEach(function (f) {
      var cls = 'todo-filter' + (currentTodoFilter === f.key ? ' active' : '');
      h += '<button class="' + cls + '" data-filter="' + f.key + '">' + esc(f.label) + '</button>';
    });
    document.getElementById('todo-filters').innerHTML = h;
  }

  function filterTodoItems(items) {
    var now = new Date().toISOString().slice(0, 10);
    if (currentTodoFilter === 'all') return items;
    if (currentTodoFilter === 'overdue') return items.filter(function (i) { return i.due && i.due < now; });
    if (currentTodoFilter === 'today') return items.filter(function (i) { return i.due === now; });
    if (currentTodoFilter === 'high') return items.filter(function (i) { return i.priority === 'high'; });
    if (currentTodoFilter === 'has-project') return items.filter(function (i) { return i.project; });
    return items;
  }

  function renderTodoList(items) {
    var filtered = filterTodoItems(items);
    if (!filtered.length) {
      var msg = currentTodoFilter === 'all' ? 'No open todos.' : 'No matching todos.';
      document.getElementById('todo-list').innerHTML = '<div class="desk-empty">' + msg + '</div>';
      return;
    }
    var now = new Date().toISOString().slice(0, 10);
    var h = '';

    // Group by project if filter is by-project
    if (currentTodoFilter === 'has-project') {
      var groups = {};
      filtered.forEach(function (i) {
        var key = i.project || 'untagged';
        if (!groups[key]) groups[key] = [];
        groups[key].push(i);
      });
      Object.keys(groups).sort().forEach(function (proj) {
        h += '<div style="padding:8px 16px 4px;font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.04em;">' + esc(proj) + '</div>';
        groups[proj].forEach(function (i) { h += todoItemHtml(i, now); });
      });
    } else {
      filtered.forEach(function (i) { h += todoItemHtml(i, now); });
    }

    document.getElementById('todo-list').innerHTML = h;
  }

  function todoItemHtml(item, now) {
    var h = '<div class="todo-item" data-todo-id="' + esc(item.id) + '">';
    h += '<div class="todo-checkbox" data-todo-check="' + esc(item.id) + '"></div>';
    h += '<div class="todo-info">';
    h += '<div class="todo-what">' + esc(item.what) + '</div>';
    h += '<div class="todo-meta">';
    if (item.due) {
      var dc = item.due < now ? 'overdue' : (item.due === now ? 'today' : (daysDiff(item.due, now) <= 7 ? 'upcoming' : 'future'));
      h += '<span class="todo-due ' + dc + '">' + esc(item.due) + '</span>';
    }
    if (item.priority && item.priority !== 'normal') {
      h += '<span class="todo-pri ' + esc(item.priority) + '">' + esc(item.priority) + '</span>';
    }
    if (item.project && currentTodoFilter !== 'has-project') {
      h += '<span class="todo-project">' + esc(item.project) + '</span>';
    }
    if (item.group) {
      h += '<span class="todo-group">' + esc(item.group) + '</span>';
    }
    if (item.recurs) {
      h += '<span class="todo-recur">&#x21bb; ' + esc(item.recurs) + '</span>';
    }
    h += '</div></div></div>';

    // Sub-items
    if (item.subs && item.subs.length) {
      h += '<div class="todo-subs">';
      item.subs.forEach(function (s) {
        var isDone = s.status === 'done';
        h += '<div class="todo-sub' + (isDone ? ' done' : '') + '">';
        h += '<div class="todo-sub-check' + (isDone ? ' done' : '') + '" data-todo-check="' + esc(s.id) + '">' + (isDone ? '&#10003;' : '') + '</div>';
        h += '<span class="todo-sub-what">' + esc(s.what) + '</span>';
        h += '</div>';
      });
      h += '</div>';
    }

    return h;
  }

  function daysDiff(dateStr, now) {
    return Math.floor((new Date(dateStr + 'T00:00:00') - new Date(now + 'T00:00:00')) / 86400000);
  }

  function handleTodoDone(id, el) {
    fetch('/api/todo/' + encodeURIComponent(id) + '/done', { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function (result) {
        if (!result.ok) return;
        // Find the todo-item or todo-sub container
        var itemEl = el.closest('.todo-item') || el.closest('.todo-sub');
        if (itemEl) {
          itemEl.classList.add('completing');
          setTimeout(function () { fetchDesk(); }, 350);
        } else {
          fetchDesk();
        }
      });
  }

  // ── Scratch pad rendering ─────────────────────────────

  function renderScratchList(entries) {
    document.getElementById('scratch-count').textContent = entries.length;
    if (!entries.length) {
      document.getElementById('scratch-list').innerHTML = '<div class="desk-empty">No scratch pad entries.</div>';
      return;
    }
    var h = '';
    entries.forEach(function (e, idx) {
      var eid = 'scratch-' + idx;
      var iconClass = e.status === 'promoted' ? 'dei-promoted' : 'dei-scratch';
      var icon = e.status === 'promoted' ? '&#10003;' : '&#x270E;';
      var badgeClass = e.status === 'promoted' ? 'deb-promoted' : 'deb-active';
      h += '<div class="desk-entry" data-expand="' + eid + '" data-scratch="' + esc(e.filename) + '">';
      h += '<div class="desk-entry-icon ' + iconClass + '">' + icon + '</div>';
      h += '<div class="desk-entry-info">';
      h += '<div class="desk-entry-title">' + esc(e.title) + '</div>';
      h += '<div class="desk-entry-sub">' + esc(e.topic) + '</div>';
      h += '</div>';
      h += '<span class="desk-entry-badge ' + badgeClass + '">' + esc(e.status) + '</span>';
      h += '<div class="desk-entry-date">' + esc(e.date || '') + (e.time ? ' ' + esc(e.time) : '') + '</div>';
      h += '</div>';
      h += '<div class="desk-entry-expand" id="' + eid + '"><div class="desk-entry-expand-inner"><div class="desk-empty">Loading...</div></div></div>';
    });
    document.getElementById('scratch-list').innerHTML = h;
  }

  function toggleScratchEntry(filename, expandEl) {
    var isOpen = expandEl.classList.contains('open');
    expandEl.classList.toggle('open');
    if (isOpen || deskContentCache['s:' + filename]) return;

    fetch('/api/desk/scratch/' + encodeURIComponent(filename))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        deskContentCache['s:' + filename] = data.content;
        expandEl.querySelector('.desk-entry-expand-inner').innerHTML = renderMd(data.content);
      });
  }

  // ── Notebook rendering ────────────────────────────────

  function renderNotebookList(entries) {
    document.getElementById('notebook-count').textContent = entries.length;
    if (!entries.length) {
      document.getElementById('notebook-list').innerHTML = '<div class="desk-empty">No notebook entries.</div>';
      return;
    }
    var h = '';
    entries.forEach(function (e, idx) {
      var eid = 'nb-' + idx;
      var iconClass = e.status === 'graduated' ? 'dei-graduated' : 'dei-notebook';
      var icon = e.status === 'graduated' ? '&#x1F393;' : '&#x1F4D3;';
      var badgeClass = 'deb-' + (e.status || 'developing');
      h += '<div class="desk-entry" data-expand="' + eid + '" data-notebook="' + esc(e.filename) + '">';
      h += '<div class="desk-entry-icon ' + iconClass + '">' + icon + '</div>';
      h += '<div class="desk-entry-info">';
      h += '<div class="desk-entry-title">' + esc(e.title) + '</div>';
      h += '<div class="desk-entry-sub">';
      if (e.projects && e.projects.length) h += e.projects.map(function (p) { return '<span class="todo-project">' + esc(p) + '</span>'; }).join(' ');
      if (e.graduated_to) h += ' &rarr; ' + esc(e.graduated_to);
      h += '</div>';
      h += '</div>';
      h += '<span class="desk-entry-badge ' + badgeClass + '">' + esc(e.status) + '</span>';
      h += '<div class="desk-entry-date">' + esc(e.date || '') + '</div>';
      h += '</div>';
      h += '<div class="desk-entry-expand" id="' + eid + '"><div class="desk-entry-expand-inner"><div class="desk-empty">Loading...</div></div></div>';
    });
    document.getElementById('notebook-list').innerHTML = h;
  }

  function toggleNotebookEntry(filename, expandEl) {
    var isOpen = expandEl.classList.contains('open');
    expandEl.classList.toggle('open');
    if (isOpen || deskContentCache['n:' + filename]) return;

    fetch('/api/desk/notebook/' + encodeURIComponent(filename))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        deskContentCache['n:' + filename] = data.content;
        expandEl.querySelector('.desk-entry-expand-inner').innerHTML = renderMd(data.content);
      });
  }

  // ── Event delegation ───────────────────────────────────

  // Summary pill clicks
  document.getElementById('summary-bar').addEventListener('click', function (e) {
    var pill = e.target.closest('.summary-pill');
    if (pill && pill.dataset.filter) {
      currentFilter = pill.dataset.filter;
      if (currentData) render(currentData);
    }
  });

  // Workspace tab clicks
  document.getElementById('workspace-tabs').addEventListener('click', function (e) {
    var tab = e.target.closest('.ws-tab');
    if (tab && tab.dataset.tab) {
      activeWsTab = tab.dataset.tab;
      document.querySelectorAll('.ws-tab').forEach(function (t) { t.classList.toggle('active', t.dataset.tab === activeWsTab); });
      document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.toggle('active', p.id === 'panel-' + activeWsTab); });
    }
  });

  // Project row clicks
  document.getElementById('tab-panels').addEventListener('click', function (e) {
    var summary = e.target.closest('.row-summary');
    if (summary) {
      var row = summary.closest('.project-row');
      if (row) toggleRow(row);
    }
  });

  // ── Desk event delegation ──────────────────────────────

  // Todo filter clicks
  document.getElementById('todo-filters').addEventListener('click', function (e) {
    var btn = e.target.closest('.todo-filter');
    if (btn && btn.dataset.filter) {
      currentTodoFilter = btn.dataset.filter;
      renderTodoFilters();
      if (deskData) renderTodoList(deskData.todos.items);
    }
  });

  // Todo checkbox clicks
  document.getElementById('todo-list').addEventListener('click', function (e) {
    var check = e.target.closest('[data-todo-check]');
    if (check) {
      e.stopPropagation();
      handleTodoDone(check.dataset.todoCheck, check);
    }
  });

  // Scratch entry expand
  document.getElementById('scratch-list').addEventListener('click', function (e) {
    var entry = e.target.closest('.desk-entry[data-scratch]');
    if (entry) {
      var expandEl = document.getElementById(entry.dataset.expand);
      if (expandEl) toggleScratchEntry(entry.dataset.scratch, expandEl);
    }
  });

  // Notebook entry expand
  document.getElementById('notebook-list').addEventListener('click', function (e) {
    var entry = e.target.closest('.desk-entry[data-notebook]');
    if (entry) {
      var expandEl = document.getElementById(entry.dataset.expand);
      if (expandEl) toggleNotebookEntry(entry.dataset.notebook, expandEl);
    }
  });

  // ── Init ─────────────────────────────────────────────────

  // Check URL for initial view
  var params = new URLSearchParams(window.location.search);
  if (params.get('view') === 'desk') {
    switchView('desk');
  }

  window.refresh = function () {
    var btn = document.getElementById('btn-refresh');
    btn.classList.add('loading');
    detailCache = {};
    deskContentCache = {};

    var promises = [
      fetch('/api/data').then(function (r) { return r.json(); })
    ];
    if (currentView === 'desk' || deskData) {
      promises.push(fetch('/api/desk').then(function (r) { return r.json(); }));
    }

    Promise.all(promises)
      .then(function (results) {
        currentData = results[0];
        render(results[0]);
        if (results[1]) {
          deskData = results[1];
          renderDesk(results[1]);
        }
      })
      .catch(function (err) {
        document.getElementById('tab-panels').innerHTML =
          '<div class="empty-state">Failed to load data: ' + esc(err.message) + '</div>';
      })
      .finally(function () { btn.classList.remove('loading'); });
  };

  window.refresh();
})();
</script>

</body>
</html>
